<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kırkikindi — Mutfak Paneli</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#C9A84C;--g2:#E8C97A;}
body{font-family:system-ui,sans-serif;background:#0a0806;min-height:100vh;color:#fff;}

.topbar{background:#080604;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,168,76,0.15);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-num{font-size:24px;font-weight:700;color:var(--g);font-family:Georgia,serif;}
.brand-name{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.5);}
.brand-sub{font-size:9px;color:rgba(255,255,255,0.3);margin-top:1px;}
.live{display:flex;align-items:center;gap:5px;font-size:10px;color:#22c55e;letter-spacing:1px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;}
.stat{background:rgba(255,255,255,0.04);border-radius:4px;padding:10px;border:1px solid rgba(255,255,255,0.06);}
.stat-val{font-size:22px;font-weight:600;color:var(--g);}
.stat-lbl{font-size:9px;letter-spacing:1px;color:rgba(255,255,255,0.35);margin-top:2px;}

.orders{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 10px 10px;}

@media(max-width:700px){.orders{grid-template-columns:repeat(2,1fr);} .stats{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.orders{grid-template-columns:1fr;}}

.order-card{border-radius:4px;border:1px solid rgba(255,255,255,0.08);overflow:hidden;transition:border-color .2s;}
.order-card.new-anim{border-color:rgba(201,168,76,0.6);}
.card-head{padding:8px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06);}
.card-masa{font-size:14px;font-weight:600;color:#fff;letter-spacing:1px;}
.card-timer{font-size:12px;color:var(--g);font-weight:500;}
.card-badge{font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:1px;}
.b-new{background:#FAEEDA;color:#854F0B;}
.b-prep{background:#E6F1FB;color:#185FA5;}
.b-ready{background:#EAF3DE;color:#27500A;}
.b-done{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.35);}
.card-items{padding:6px 10px;}
.card-item{font-size:11px;color:rgba(255,255,255,0.7);padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.card-item:last-child{border-bottom:none;}
.card-note{font-size:10px;color:var(--g);padding:5px 10px;border-top:1px solid rgba(201,168,76,0.1);font-style:italic;}
.card-actions{display:flex;border-top:1px solid rgba(255,255,255,0.05);}
.card-btn{flex:1;padding:8px;font-size:9px;letter-spacing:1px;border:none;cursor:pointer;font-family:inherit;}
.btn-next{background:rgba(201,168,76,0.15);color:var(--g);}
.btn-next:hover{background:rgba(201,168,76,0.28);}
.btn-done{background:rgba(34,197,94,0.1);color:#22c55e;}
.btn-done:hover{background:rgba(34,197,94,0.2);}

.empty-state{text-align:center;padding:3rem;color:rgba(255,255,255,0.25);font-size:14px;}

.notif-toast{background:var(--g);color:#000;padding:10px 16px;font-size:11px;font-weight:500;letter-spacing:1px;text-align:center;display:none;}
.notif-toast.on{display:block;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-num">40</div>
    <div>
      <div class="brand-name">KIRKİKİNDİ</div>
      <div class="brand-sub">Mutfak Paneli</div>
    </div>
  </div>
  <div class="live"><div class="live-dot"></div>CANLI</div>
</div>

<div class="notif-toast" id="notif"></div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-aktif">0</div><div class="stat-lbl">AKTİF</div></div>
  <div class="stat"><div class="stat-val" id="s-hazir">0</div><div class="stat-lbl">HAZIR</div></div>
  <div class="stat"><div class="stat-val" id="s-bugun">0</div><div class="stat-lbl">BUGÜN</div></div>
  <div class="stat"><div class="stat-val" id="s-ciro" style="font-size:16px;">₺0</div><div class="stat-lbl">CİRO</div></div>
</div>

<div class="orders" id="orders-grid">
  <div class="empty-state">Yeni sipariş bekleniyor...</div>
</div>

<script>
// ==============================
var SUPABASE_URL = 'https://xhuvpbzpghazpipaovwt.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_vR5mtSCXn0nxd-_I0TzLfw_jQrT_KZK';
// ==============================

var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var orders = {};

var statusLabels = {new:'YENİ SİPARİŞ', prep:'HAZIRLANIYOR', ready:'HAZIR ✓', done:'TESLİM'};
var statusBadge  = {new:'b-new', prep:'b-prep', ready:'b-ready', done:'b-done'};
var statusBg     = {new:'#110a02', prep:'#02080f', ready:'#021008', done:'#0a0a0a'};
var nextLabel    = {new:'Hazırlamaya Başla', prep:'Hazır İşaretle ✓', ready:'Servis Edildi'};

async function loadOrders(){
  var today = new Date().toISOString().split('T')[0];
  var {data} = await sb.from('siparisler')
    .select('*')
    .gte('created_at', today)
    .order('created_at', {ascending:false});
  if(data) data.forEach(function(o){ orders[o.id] = o; });
  render();
}

function render(){
  var active = Object.values(orders).filter(function(o){return o.durum !== 'done';});
  var hazir  = active.filter(function(o){return o.durum === 'ready';});
  var bugun  = Object.values(orders).length;
  var ciro   = Object.values(orders).reduce(function(s,o){return s+(o.toplam||0);}, 0);

  document.getElementById('s-aktif').textContent = active.length;
  document.getElementById('s-hazir').textContent = hazir.length;
  document.getElementById('s-bugun').textContent = bugun;
  document.getElementById('s-ciro').textContent  = '₺' + ciro.toLocaleString('tr');

  if(!active.length){
    document.getElementById('orders-grid').innerHTML = '<div class="empty-state">Yeni sipariş bekleniyor...</div>';
    return;
  }

  var html = '';
  active.sort(function(a,b){
    var pri = {new:0,prep:1,ready:2};
    return (pri[a.durum]||3) - (pri[b.durum]||3);
  }).forEach(function(o){
    var items = Array.isArray(o.items) ? o.items : JSON.parse(o.items||'[]');
    var mins  = o.eta_dakika || '—';
    var btnHtml = '';
    if(nextLabel[o.durum]){
      var btnCls = o.durum === 'ready' ? 'btn-done' : 'btn-next';
      btnHtml = '<button class="card-btn ' + btnCls + '" onclick="advance(\'' + o.id + '\')">' + nextLabel[o.durum] + '</button>';
    }
    html += '<div class="order-card" id="oc-' + o.id + '" style="background:' + (statusBg[o.durum]||'#111') + ';">';
    html += '<div class="card-head"><div><div class="card-masa">Masa ' + o.masa_no + '</div><span class="card-badge ' + statusBadge[o.durum] + '">' + statusLabels[o.durum] + '</span></div><div class="card-timer">' + mins + (mins !== '—' ? ' dk' : '') + '</div></div>';
    html += '<div class="card-items">' + items.map(function(it){return '<div class="card-item">' + it + '</div>';}).join('') + '</div>';
    if(o.siparis_notu) html += '<div class="card-note">Not: ' + o.siparis_notu + '</div>';
    if(btnHtml) html += '<div class="card-actions">' + btnHtml + '</div>';
    html += '</div>';
  });
  document.getElementById('orders-grid').innerHTML = html;
}

async function advance(id){
  var o = orders[id];
  if(!o) return;
  var steps = ['new','prep','ready','done'];
  var idx   = steps.indexOf(o.durum);
  var next  = steps[idx+1] || 'done';
  var eta   = next === 'prep' ? Math.floor(Math.random()*8+10) : null;

  await sb.from('siparisler').update({durum:next, eta_dakika:eta}).eq('id', id);
  orders[id].durum = next;
  orders[id].eta_dakika = eta;
  render();

  if(next === 'ready'){
    showNotif('Masa ' + o.masa_no + ' siparişi HAZIR!');
  }
}

function showNotif(msg){
  var n = document.getElementById('notif');
  n.textContent = msg; n.classList.add('on');
  setTimeout(function(){n.classList.remove('on');}, 4000);
}

// Gerçek zamanlı dinleme
sb.channel('mutfak-kanal')
  .on('postgres_changes', {event:'INSERT', schema:'public', table:'siparisler'}, function(p){
    orders[p.new.id] = p.new;
    showNotif('YENİ SİPARİŞ! Masa ' + p.new.masa_no);
    render();
  })
  .on('postgres_changes', {event:'UPDATE', schema:'public', table:'siparisler'}, function(p){
    orders[p.new.id] = p.new;
    render();
  })
  .subscribe();

// Garson çağrıları dinle
sb.channel('garson-kanal')
  .on('postgres_changes', {event:'INSERT', schema:'public', table:'garson_cagrisi'}, function(p){
    showNotif('GARSON ÇAĞRISI — Masa ' + p.new.masa_no + ': ' + p.new.mesaj);
  })
  .subscribe();

loadOrders();

// Timer güncelle
setInterval(function(){
  Object.values(orders).forEach(function(o){
    if(o.durum === 'prep' && o.eta_dakika > 0){
      o.eta_dakika--;
    }
  });
  render();
}, 60000);
</script>
</body>
</html>
