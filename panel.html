<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kırkikindi — Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#C9A84C;--g2:#E8C97A;--g3:#8B6914;--siyah:#120E08;}
body{font-family:system-ui,sans-serif;background:var(--siyah);min-height:100vh;color:#fff;}

#giris{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.logo-num{font-family:Georgia,serif;font-size:52px;color:var(--g);line-height:1;}
.logo-ad{font-size:12px;letter-spacing:4px;color:#fff;margin-top:4px;}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-top:4px;}
.rol-sec{font-size:10px;letter-spacing:2px;color:rgba(201,168,76,0.6);margin:1.5rem 0 1rem;text-align:center;}
.rol-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:320px;}
.rol-k{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:1.5rem 1rem;cursor:pointer;text-align:center;transition:all .2s;}
.rol-k:hover,.rol-k:active{border-color:var(--g);background:rgba(201,168,76,0.08);}
.rol-ico{font-size:26px;margin-bottom:8px;}
.rol-nm{font-size:11px;letter-spacing:2px;color:var(--g);}
.rol-ds{font-size:10px;color:rgba(255,255,255,0.4);margin-top:4px;}

#sifre-ekran{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.sifre-lbl{font-size:10px;letter-spacing:2px;color:rgba(201,168,76,0.6);margin-bottom:1rem;text-align:center;}
.sifre-inp{width:100%;max-width:280px;padding:14px;font-size:22px;text-align:center;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);color:#fff;border-radius:4px;outline:none;letter-spacing:4px;margin-bottom:10px;display:block;}
.sifre-btn{width:100%;max-width:280px;padding:12px;background:var(--g);color:#000;font-size:10px;letter-spacing:2px;border:none;border-radius:2px;cursor:pointer;font-weight:600;}
.sifre-hata{color:#E24B4A;font-size:11px;margin-top:8px;display:none;text-align:center;}
.geri{margin-top:1rem;font-size:11px;color:rgba(255,255,255,0.35);cursor:pointer;text-decoration:underline;}

#app{display:none;}
.topbar{background:var(--siyah);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,168,76,0.15);position:sticky;top:0;z-index:50;}
.brand-num{font-size:18px;font-weight:700;color:var(--g);font-family:Georgia,serif;margin-right:8px;}
.brand-rol{font-size:9px;color:var(--g);letter-spacing:1px;}
.live{display:flex;align-items:center;gap:5px;font-size:9px;color:#22c55e;}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.cikis-btn{font-size:9px;color:rgba(255,255,255,0.3);cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.1);border-radius:2px;}

.notif-bar{background:var(--g);color:#000;padding:8px 14px;font-size:11px;font-weight:600;text-align:center;display:none;}
.notif-bar.on{display:block;}

.gtabs{display:flex;border-bottom:1px solid rgba(201,168,76,0.15);}
.gtab{flex:1;padding:11px 8px;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.4);cursor:pointer;text-align:center;border-bottom:2px solid transparent;}
.gtab.on{color:var(--g);border-bottom-color:var(--g);}
.pg{display:none;padding:12px;}
.pg.on{display:block;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.stat{background:rgba(255,255,255,0.04);border-radius:6px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,0.06);}
.stat-val{font-size:20px;font-weight:700;color:var(--g);}
.stat-lbl{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,0.4);margin-top:2px;}

.sip-kart{background:#1a1005;border-radius:8px;margin-bottom:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
.sip-head{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06);}
.sip-masa{font-size:15px;font-weight:700;color:#fff;}
.sip-sure{font-size:10px;color:rgba(255,255,255,0.35);}
.badge{font-size:8px;padding:3px 8px;border-radius:2px;font-weight:600;letter-spacing:1px;}
.b-yeni{background:#FAEEDA;color:#854F0B;}
.b-prep{background:#E6F1FB;color:#185FA5;}
.b-hazir{background:#EAF3DE;color:#27500A;}
.sip-items{padding:8px 12px;}
.sip-item{font-size:12px;color:rgba(255,255,255,0.7);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.sip-item:last-child{border-bottom:none;}
.sip-not{font-size:11px;font-style:italic;color:var(--g2);padding:6px 12px;background:rgba(201,168,76,0.06);}
.sip-actions{display:flex;}
.sip-btn{flex:1;padding:11px;font-size:9px;letter-spacing:1px;border:none;cursor:pointer;font-weight:600;transition:all .2s;}
.btn-hazirla{background:rgba(56,130,221,0.2);color:#85B7EB;}
.btn-hazir{background:rgba(30,158,117,0.2);color:#5DCAA5;}
.btn-servis{background:rgba(201,168,76,0.2);color:var(--g2);}

.cagri-kart{background:#1a1005;border-radius:8px;margin-bottom:8px;padding:12px;border:1px solid rgba(201,168,76,0.25);display:flex;justify-content:space-between;align-items:center;}
.cagri-masa{font-size:14px;font-weight:700;color:var(--g);}
.cagri-mesaj{font-size:12px;color:rgba(255,255,255,0.7);margin-top:3px;}
.cagri-sure{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px;text-align:right;}
.cagri-tamam{padding:7px 14px;background:rgba(30,158,117,0.2);color:#5DCAA5;border:1px solid rgba(30,158,117,0.3);border-radius:3px;font-size:9px;cursor:pointer;display:block;}

.yenile-btn{width:100%;padding:10px;background:rgba(201,168,76,0.1);color:var(--g);border:1px solid rgba(201,168,76,0.2);border-radius:4px;font-size:10px;letter-spacing:1px;cursor:pointer;margin-bottom:12px;}
.bos{text-align:center;padding:3rem;font-size:13px;color:rgba(255,255,255,0.25);font-style:italic;}
</style>
</head>
<body>

<div id="giris">
  <div style="text-align:center;margin-bottom:2rem;">
    <div class="logo-num">40</div>
    <div class="logo-ad">KIRKİKİNDİ</div>
    <div class="logo-sub">Akyokuş Kasrı · Konya</div>
  </div>
  <div class="rol-sec">ROLÜNÜZÜ SEÇİN</div>
  <div class="rol-grid">
    <div class="rol-k" onclick="rolSec('mutfak')">
      <div class="rol-ico">&#x1F373;</div>
      <div class="rol-nm">MUTFAK</div>
      <div class="rol-ds">Sipariş takibi</div>
    </div>
    <div class="rol-k" onclick="rolSec('garson')">
      <div class="rol-ico">&#x1F64B;</div>
      <div class="rol-nm">GARSON</div>
      <div class="rol-ds">Masa ve çağrı</div>
    </div>
  </div>
</div>

<div id="sifre-ekran">
  <div style="text-align:center;margin-bottom:2rem;">
    <div class="logo-num">40</div>
    <div class="logo-ad">KIRKİKİNDİ</div>
  </div>
  <div class="sifre-lbl" id="sifre-lbl">MUTFAK SİFRESİ</div>
  <input class="sifre-inp" id="sifre-inp" type="password" placeholder="&bull;&bull;&bull;&bull;" maxlength="10">
  <button class="sifre-btn" onclick="sifreGir()">GİRİŞ</button>
  <div class="sifre-hata" id="sifre-hata">Yanlis sifre.</div>
  <div class="geri" onclick="geriDon()">← Geri</div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;">
      <span class="brand-num">40</span>
      <span class="brand-rol" id="rol-lbl"></span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="live"><div class="live-dot"></div><span>CANLI</span></div>
      <div class="cikis-btn" onclick="cikisYap()">Cikis</div>
    </div>
  </div>
  <div class="notif-bar" id="notif-bar"></div>

  <div id="mutfak-wrap" style="display:none;">
    <div class="pg on" style="display:block;">
      <div class="stats">
        <div class="stat"><div class="stat-val" id="s-yeni">0</div><div class="stat-lbl">YENİ</div></div>
        <div class="stat"><div class="stat-val" id="s-prep">0</div><div class="stat-lbl">HAZIRLANIYOR</div></div>
        <div class="stat"><div class="stat-val" id="s-hazir">0</div><div class="stat-lbl">HAZIR</div></div>
        <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">TAMAMLANAN</div></div>
      </div>
      <button class="yenile-btn" onclick="siparisleriYukle()">&#8635; Yenile</button>
      <div id="sip-liste"></div>
    </div>
  </div>

  <div id="garson-wrap" style="display:none;">
    <div class="gtabs">
      <div class="gtab on" id="gt0" onclick="garsonTab(0)">ÇAĞRILAR</div>
      <div class="gtab" id="gt1" onclick="garsonTab(1)">SİPARİŞLER</div>
    </div>
    <div id="gp0" class="pg on">
      <button class="yenile-btn" onclick="cagrilariYukle()">&#8635; Yenile</button>
      <div id="cagri-liste"></div>
    </div>
    <div id="gp1" class="pg">
      <button class="yenile-btn" onclick="siparisleriYukle()">&#8635; Yenile</button>
      <div id="garson-sip-liste"></div>
    </div>
  </div>
</div>

<script>
var aktifRol = '';
var SIFRELER = JSON.parse(localStorage.getItem('sifreler') || '{"mutfak":"1234","garson":"5678"}');

function rolSec(rol) {
  aktifRol = rol;
  document.getElementById('giris').style.display = 'none';
  document.getElementById('sifre-ekran').style.display = 'flex';
  document.getElementById('sifre-lbl').textContent = rol === 'mutfak' ? 'MUTFAK SIFRESI' : 'GARSON SIFRESI';
  document.getElementById('sifre-inp').value = '';
  document.getElementById('sifre-hata').style.display = 'none';
  setTimeout(function() { document.getElementById('sifre-inp').focus(); }, 100);
}

function geriDon() {
  document.getElementById('sifre-ekran').style.display = 'none';
  document.getElementById('giris').style.display = 'flex';
}

function sifreGir() {
  var v = document.getElementById('sifre-inp').value;
  var dogru = aktifRol === 'mutfak' ? SIFRELER.mutfak : SIFRELER.garson;
  if (v !== dogru) { document.getElementById('sifre-hata').style.display = 'block'; return; }
  document.getElementById('sifre-ekran').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('rol-lbl').textContent = aktifRol === 'mutfak' ? 'MUTFAK' : 'GARSON';
  if (aktifRol === 'mutfak') {
    document.getElementById('mutfak-wrap').style.display = 'block';
    siparisleriYukle();
  } else {
    document.getElementById('garson-wrap').style.display = 'block';
    cagrilariYukle();
    siparisleriYukle();
  }
  setInterval(function() {
    siparisleriYukle();
    if (aktifRol === 'garson') cagrilariYukle();
  }, 15000);
}

document.getElementById('sifre-inp').addEventListener('keypress', function(e) { if (e.key === 'Enter') sifreGir(); });

function cikisYap() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('mutfak-wrap').style.display = 'none';
  document.getElementById('garson-wrap').style.display = 'none';
  document.getElementById('giris').style.display = 'flex';
}

function zamanHesapla(tarih) {
  var fark = Math.floor((new Date() - new Date(tarih)) / 60000);
  if (fark < 1) return 'Az once';
  if (fark < 60) return fark + ' dk once';
  return Math.floor(fark / 60) + ' sa once';
}

function bildirim(msg) {
  var el = document.getElementById('notif-bar');
  el.textContent = msg; el.classList.add('on');
  setTimeout(function() { el.classList.remove('on'); }, 3000);
}

// SİPARİŞLER - localStorage'dan oku
function siparisleriYukle() {
  var tumSiparisler = JSON.parse(localStorage.getItem('siparisler') || '[]');
  var aktif = tumSiparisler.filter(function(s) { return s.durum !== 'done'; });
  var bugun = new Date();
  bugun.setHours(0,0,0,0);
  aktif = aktif.filter(function(s) { return new Date(s.created_at) >= bugun; });

  document.getElementById('s-yeni').textContent = aktif.filter(function(s){return s.durum==='new';}).length;
  document.getElementById('s-prep').textContent = aktif.filter(function(s){return s.durum==='prep';}).length;
  document.getElementById('s-hazir').textContent = aktif.filter(function(s){return s.durum==='ready';}).length;
  var done = tumSiparisler.filter(function(s){return s.durum==='done';}).length;
  document.getElementById('s-done').textContent = done;

  if (aktif.length === 0) {
    document.getElementById('sip-liste').innerHTML = '<div class="bos">Bekleyen siparis yok.</div>';
    document.getElementById('garson-sip-liste').innerHTML = '<div class="bos">Bekleyen siparis yok.</div>';
    return;
  }

  var html = '';
  aktif.sort(function(a,b){return new Date(a.created_at)-new Date(b.created_at);});
  aktif.forEach(function(s) {
    var badge = '';
    if (s.durum === 'new') badge = '<span class="badge b-yeni">YENI</span>';
    else if (s.durum === 'prep') badge = '<span class="badge b-prep">HAZIRLANIYOR</span>';
    else if (s.durum === 'ready') badge = '<span class="badge b-hazir">HAZIR</span>';

    html += '<div class="sip-kart">';
    html += '<div class="sip-head"><div class="sip-masa">Masa ' + s.masa_no + '</div>';
    html += '<div style="display:flex;align-items:center;gap:8px;">' + badge + '<span class="sip-sure">' + zamanHesapla(s.created_at) + '</span></div></div>';
    html += '<div class="sip-items">';
    if (Array.isArray(s.items)) {
      s.items.forEach(function(u) { html += '<div class="sip-item">&#8226; ' + u + '</div>'; });
    }
    html += '</div>';
    if (s.siparis_notu) html += '<div class="sip-not">Not: ' + s.siparis_notu + '</div>';
    html += '<div class="sip-actions">';
    if (s.durum === 'new') html += '<button class="sip-btn btn-hazirla" onclick="durumGuncelle(' + s.id + ',\'prep\')">&#9658; HAZIRLAMAYA BASLA</button>';
    if (s.durum === 'prep') html += '<button class="sip-btn btn-hazir" onclick="durumGuncelle(' + s.id + ',\'ready\')">&#10003; HAZIR</button>';
    if (s.durum === 'ready') html += '<button class="sip-btn btn-servis" onclick="durumGuncelle(' + s.id + ',\'done\')">&#10022; SERVIS EDILDI</button>';
    html += '</div></div>';
  });

  document.getElementById('sip-liste').innerHTML = html;
  document.getElementById('garson-sip-liste').innerHTML = html;
}

function durumGuncelle(id, durum) {
  var siparisler = JSON.parse(localStorage.getItem('siparisler') || '[]');
  var idx = siparisler.findIndex(function(s) { return s.id == id; });
  if (idx === -1) { bildirim('Siparis bulunamadi!'); return; }
  siparisler[idx].durum = durum;
  localStorage.setItem('siparisler', JSON.stringify(siparisler));
  siparisleriYukle();
  if (durum === 'prep') bildirim('Hazirlaniyor...');
  if (durum === 'ready') bildirim('Siparis hazir!');
  if (durum === 'done') bildirim('Servis edildi!');
}

// GARSON ÇAĞRILARI
function cagrilariYukle() {
  var cagriler = JSON.parse(localStorage.getItem('garson_cagrisi_log') || '[]');
  var bugun = new Date(); bugun.setHours(0,0,0,0);
  cagriler = cagriler.filter(function(c) { return new Date(c.created_at) >= bugun; });

  if (cagriler.length === 0) {
    document.getElementById('cagri-liste').innerHTML = '<div class="bos">Bugün çağrı yok.</div>';
    return;
  }
  cagriler.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  var html = '';
  cagriler.forEach(function(c) {
    html += '<div class="cagri-kart">';
    html += '<div><div class="cagri-masa">Masa ' + c.masa_no + '</div>';
    html += '<div class="cagri-mesaj">' + c.mesaj + '</div></div>';
    html += '<div><div class="cagri-sure">' + zamanHesapla(c.created_at) + '</div>';
    html += '<button class="cagri-tamam" onclick="cagriSil(' + c.id + ')">Tamam</button></div>';
    html += '</div>';
  });
  document.getElementById('cagri-liste').innerHTML = html;
}

function cagriSil(id) {
  var cagriler = JSON.parse(localStorage.getItem('garson_cagrisi_log') || '[]');
  cagriler = cagriler.filter(function(c) { return c.id !== id; });
  localStorage.setItem('garson_cagrisi_log', JSON.stringify(cagriler));
  cagrilariYukle();
}

function garsonTab(i) {
  document.querySelectorAll('.gtab').forEach(function(t,idx){t.classList.toggle('on', idx===i);});
  document.getElementById('gp0').classList.toggle('on', i===0);
  document.getElementById('gp1').classList.toggle('on', i===1);
  document.getElementById('gp0').style.display = i===0?'block':'none';
  document.getElementById('gp1').style.display = i===1?'block':'none';
}
</script>
</body>
</html>
