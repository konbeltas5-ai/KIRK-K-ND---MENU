<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kırkikindi — Yönetim</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#C9A84C;--g2:#E8C97A;--g3:#8B6914;--siyah:#120E08;--ink:#0F0D09;--paper:#FDFAF4;}
body{font-family:system-ui,sans-serif;background:#f5f2eb;min-height:100vh;}

/* GİRİŞ */
#giris{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--siyah);padding:2rem;}
.g-num{font-family:Georgia,serif;font-size:52px;color:var(--g);line-height:1;}
.g-ad{font-size:12px;letter-spacing:4px;color:#fff;margin-top:4px;}
.g-lbl{font-size:9px;letter-spacing:2px;color:rgba(201,168,76,0.6);margin:1.5rem 0 8px;text-align:center;}
.g-inp{width:100%;max-width:280px;padding:14px;font-size:20px;text-align:center;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);color:#fff;border-radius:4px;outline:none;letter-spacing:4px;margin-bottom:10px;display:block;}
.g-btn{width:100%;max-width:280px;padding:12px;background:var(--g);color:#000;font-size:10px;letter-spacing:2px;border:none;border-radius:2px;cursor:pointer;font-weight:600;}
.g-hata{color:#E24B4A;font-size:11px;margin-top:8px;font-style:italic;display:none;text-align:center;}

/* UYGULAMA */
#app{display:none;}
.topbar{background:var(--siyah);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.t-brand{display:flex;align-items:center;gap:8px;}
.t-num{font-size:20px;font-weight:700;color:var(--g);font-family:Georgia,serif;}
.t-nm{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.5);}
.t-sub{font-size:8px;color:var(--g);letter-spacing:1px;margin-top:1px;}
.cikis{font-size:9px;color:rgba(255,255,255,0.3);cursor:pointer;padding:4px 8px;border:1px solid rgba(255,255,255,0.1);border-radius:2px;}

.nav{display:flex;background:#fff;border-bottom:1px solid #e8e0d0;overflow-x:auto;}
.nav-btn{flex-shrink:0;padding:11px 14px;font-size:10px;letter-spacing:1px;color:#888;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.nav-btn.on{color:var(--g3);border-bottom-color:var(--g);font-weight:600;}

.notif{background:var(--g);color:#000;padding:8px 16px;font-size:11px;font-weight:600;text-align:center;display:none;}
.notif.on{display:block;}

.pg{display:none;padding:14px;}
.pg.on{display:block;}

.card{background:#fff;border-radius:8px;border:0.5px solid #e8e0d0;margin-bottom:12px;overflow:hidden;}
.card-head{padding:11px 14px;border-bottom:0.5px solid #f0ebe0;display:flex;justify-content:space-between;align-items:center;}
.card-title{font-size:13px;font-weight:600;color:var(--ink);}
.card-sub{font-size:11px;color:#999;margin-top:2px;}
.card-body{padding:12px 14px;}

.field{margin-bottom:10px;}
.field label{display:block;font-size:9px;letter-spacing:1px;color:#888;margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;padding:8px 10px;border:0.5px solid #ddd;border-radius:4px;font-size:13px;color:var(--ink);background:#fff;outline:none;font-family:inherit;}
.field input:focus,.field textarea:focus{border-color:var(--g);}
.field textarea{min-height:56px;resize:vertical;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.save-btn{padding:8px 18px;background:var(--siyah);color:var(--g);font-size:9px;letter-spacing:1.5px;border:none;border-radius:2px;cursor:pointer;}
.save-btn:hover{background:var(--g);color:#000;}
.del-btn{padding:8px 12px;background:#FCEBEB;color:#A32D2D;font-size:9px;border:0.5px solid #E24B4A;border-radius:2px;cursor:pointer;}
.add-btn{padding:8px 14px;background:#EAF3DE;color:#27500A;font-size:9px;letter-spacing:1px;border:0.5px solid #639922;border-radius:2px;cursor:pointer;}

.menu-item{background:#fff;border:0.5px solid #e8e0d0;border-radius:6px;padding:11px;margin-bottom:8px;}
.mi-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.mi-nm{font-size:13px;font-weight:600;color:var(--ink);}
.mi-fiyat{font-size:13px;color:var(--g3);font-weight:600;}
.mi-kat{font-size:10px;color:#999;margin-top:2px;}

.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid #f5f0e8;}
.toggle-row:last-child{border-bottom:none;}
.toggle-lbl{font-size:13px;color:var(--ink);}
.toggle-sub{font-size:11px;color:#999;margin-top:1px;}
.tog{width:36px;height:20px;background:#ddd;border-radius:10px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.tog.on{background:#1D9E75;}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}
.tog.on::after{transform:translateX(16px);}

.garson-item,.sef-item{background:#f9f6f0;border:0.5px solid #e8e0d0;border-radius:6px;padding:11px;margin-bottom:8px;}
</style>
</head>
<body>

<!-- GİRİŞ -->
<div id="giris">
  <div style="text-align:center;margin-bottom:1.5rem;">
    <div class="g-num">40</div>
    <div class="g-ad">KIRKİKİNDİ</div>
  </div>
  <div class="g-lbl">YÖNETİCİ ŞİFRESİ</div>
  <input class="g-inp" type="password" id="pw-inp" placeholder="••••" maxlength="10">
  <button class="g-btn" onclick="girisYap()">◆ GİRİŞ YAP</button>
  <div class="g-hata" id="giris-hata">Yanlış şifre.</div>
</div>

<!-- UYGULAMA -->
<div id="app">
  <div class="topbar">
    <div class="t-brand">
      <div class="t-num">40</div>
      <div>
        <div class="t-nm">KIRKİKİNDİ</div>
        <div class="t-sub">Yönetim Paneli</div>
      </div>
    </div>
    <div class="cikis" onclick="cikisYap()">Çıkış</div>
  </div>

  <div class="notif" id="notif"></div>

  <div class="nav">
    <div class="nav-btn on" onclick="goster('menu-pg',this)">Menü</div>
    <div class="nav-btn" onclick="goster('sef-pg',this)">Şefin Menüsü</div>
    <div class="nav-btn" onclick="goster('garson-pg',this)">Garson Kartları</div>
    <div class="nav-btn" onclick="goster('sifre-pg',this)">Ayarlar</div>
  </div>

  <!-- MENÜ -->
  <div id="menu-pg" class="pg on">
    <button class="add-btn" onclick="yeniUrun()" style="margin-bottom:12px;width:100%;padding:10px;">+ Yeni Ürün Ekle</button>
    <div id="menu-liste"></div>
  </div>

  <!-- ŞEFİN MENÜSÜ -->
  <div id="sef-pg" class="pg">
    <div class="card">
      <div class="card-head"><div><div class="card-title">Tab ve Başlık</div></div></div>
      <div class="card-body">
        <div class="field"><label>MENÜDE GÖRÜNEN TAB ADI</label><input type="text" id="sef-tab" placeholder="Şefin Menüsü"></div>
        <div class="field"><label>SAYFA BAŞLIĞI</label><input type="text" id="sef-baslik" placeholder="Şefin Seçkileri"></div>
        <button class="save-btn" onclick="sefBaslikKaydet()">Kaydet</button>
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">Öneri Kartları</div>
        <button class="add-btn" onclick="sefEkle()">+ Ekle</button>
      </div>
      <div class="card-body">
        <div id="sef-liste"></div>
        <button class="save-btn" onclick="sefKaydet()">Tümünü Kaydet</button>
      </div>
    </div>
  </div>

  <!-- GARSON KARTLARI -->
  <div id="garson-pg" class="pg">
    <div class="card">
      <div class="card-head">
        <div class="card-title">Garson Çağrı Kartları</div>
        <button class="add-btn" onclick="garsonEkle()">+ Ekle</button>
      </div>
      <div class="card-body">
        <div id="garson-liste"></div>
        <button class="save-btn" onclick="garsonKaydet()">Tümünü Kaydet</button>
      </div>
    </div>
  </div>

  <!-- AYARLAR -->
  <div id="sifre-pg" class="pg">
    <div class="card">
      <div class="card-head"><div class="card-title">Şifre Değiştir</div></div>
      <div class="card-body">
        <div class="field"><label>YÖNETİM ŞİFRESİ</label><input type="password" id="pw-yon" placeholder="Yeni şifre"></div>
        <div class="field"><label>MUTFAK ŞİFRESİ</label><input type="password" id="pw-mutfak" placeholder="Yeni şifre"></div>
        <div class="field"><label>GARSON ŞİFRESİ</label><input type="password" id="pw-garson" placeholder="Yeni şifre"></div>
        <button class="save-btn" onclick="sifreKaydet()">Şifreleri Kaydet</button>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Genel Ayarlar</div></div>
      <div class="card-body">
        <div class="toggle-row">
          <div><div class="toggle-lbl">QR Menü aktif</div><div class="toggle-sub">Müşteriler menüye erişebilir</div></div>
          <div class="tog on" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="toggle-row">
          <div><div class="toggle-lbl">Sipariş alma aktif</div><div class="toggle-sub">Müşteriler sipariş verebilir</div></div>
          <div class="tog on" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var SB_URL='https://xhuvpbzpghazpipaovwt.supabase.co';
var SB_KEY='sb_publishable_yRJxY27Pu36bRjcUdWrDWg_kf91VdGL';
var sb=null;
try{sb=window.supabase.createClient(SB_URL,SB_KEY);}catch(e){}

var YON_SIFRE=localStorage.getItem('pw_yon')||'9999';
var menuItems=[];

// GİRİŞ
function girisYap(){
  var v=document.getElementById('pw-inp').value;
  if(v!==YON_SIFRE){document.getElementById('giris-hata').style.display='block';return;}
  document.getElementById('giris').style.display='none';
  document.getElementById('app').style.display='block';
  tumunuYukle();
}
document.getElementById('pw-inp').addEventListener('keypress',function(e){if(e.key==='Enter')girisYap();});
function cikisYap(){document.getElementById('app').style.display='none';document.getElementById('giris').style.display='flex';}

function goster(id,btn){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  btn.classList.add('on');
}

function showNotif(msg){
  var el=document.getElementById('notif');
  el.textContent=msg;el.classList.add('on');
  setTimeout(function(){el.classList.remove('on');},3000);
}

function tumunuYukle(){
  menuYukle();
  sefYukle();
  garsonYukle();
}

// MENÜ
async function menuYukle(){
  if(!sb){menuLocalYukle();return;}
  var res=await sb.from('menu').select('*').order('kategori').order('sira');
  if(res.error||!res.data||res.data.length===0){menuLocalYukle();return;}
  menuItems=res.data;
  menuRender();
}

function menuLocalYukle(){
  // Supabase yoksa boş göster
  document.getElementById('menu-liste').innerHTML='<div style="text-align:center;padding:2rem;color:#999;font-style:italic;">Menü veritabanı bağlantısı yok.<br>Supabase RLS ayarını kontrol edin.</div>';
}

function menuRender(){
  var kategoriler={};
  menuItems.forEach(function(it){
    if(!kategoriler[it.kategori])kategoriler[it.kategori]=[];
    kategoriler[it.kategori].push(it);
  });
  var html='';
  Object.keys(kategoriler).forEach(function(kat){
    html+='<div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:2px;color:var(--g3);padding:8px 4px 4px;border-bottom:1px solid #e8e0d0;margin-bottom:8px;">'+kat.toUpperCase()+'</div>';
    kategoriler[kat].forEach(function(it){
      html+='<div class="menu-item">';
      html+='<div class="mi-head"><div><div class="mi-nm">'+it.isim+'</div><div class="mi-kat">'+it.kategori+'</div></div><div class="mi-fiyat">₺'+it.fiyat+'</div></div>';
      html+='<div class="field-row">';
      html+='<div class="field"><label>FİYAT (₺)</label><input type="number" id="fiyat-'+it.id+'" value="'+it.fiyat+'"></div>';
      html+='<div class="field"><label>STOK</label><div style="display:flex;align-items:center;gap:8px;margin-top:6px;"><div class="tog'+(it.stok!==false?' on':'')+'" id="stok-'+it.id+'" onclick="this.classList.toggle(\'on\')"></div><span style="font-size:11px;color:#888;">Var</span></div></div>';
      html+='</div>';
      html+='<div class="field"><label>AÇIKLAMA</label><textarea id="acik-'+it.id+'">'+( it.aciklama||'')+'</textarea></div>';
      html+='<div class="field"><label>MUTFAK NOTU</label><textarea id="mnotu-'+it.id+'" style="min-height:40px;">'+(it.mutfak_notu||'')+'</textarea></div>';
      html+='<div style="display:flex;gap:6px;margin-top:4px;">';
      html+='<button class="save-btn" onclick="itemKaydet('+it.id+')">💾 Kaydet</button>';
      html+='<button class="del-btn" onclick="itemSil('+it.id+',\''+it.isim+'\')">🗑 Sil</button>';
      html+='</div></div>';
    });
  });
  document.getElementById('menu-liste').innerHTML=html||'<div style="text-align:center;padding:2rem;color:#999;">Menü boş.</div>';
}

async function itemKaydet(id){
  var fiyat=parseInt(document.getElementById('fiyat-'+id).value)||0;
  var aciklama=document.getElementById('acik-'+id).value;
  var mnotu=document.getElementById('mnotu-'+id)?document.getElementById('mnotu-'+id).value:'';
  var stok=document.getElementById('stok-'+id)?document.getElementById('stok-'+id).classList.contains('on'):true;
  if(!sb){showNotif('Supabase bağlantısı yok!');return;}
  var res=await sb.from('menu').update({fiyat:fiyat,aciklama:aciklama,mutfak_notu:mnotu,stok:stok}).eq('id',id);
  if(res.error){showNotif('Hata: '+res.error.message);return;}
  showNotif('✓ Kaydedildi!');
  menuYukle();
}

async function itemSil(id,isim){
  if(!confirm(isim+' silinsin mi?'))return;
  if(!sb){showNotif('Supabase bağlantısı yok!');return;}
  var res=await sb.from('menu').delete().eq('id',id);
  if(res.error){showNotif('Hata: '+res.error.message);return;}
  showNotif('✓ Silindi!');
  menuYukle();
}

function yeniUrun(){
  var kat=prompt('Kategori:\n- Soğuk Başlangıçlar\n- Çorbalar\n- Ana Yemekler\n- Tatlılar\n- İçecekler');
  if(!kat)return;
  var isim=prompt('Yemek adı:');
  if(!isim)return;
  var fiyat=prompt('Fiyat (₺):');
  if(!fiyat)return;
  var aciklama=prompt('Açıklama:')||'';
  if(!sb){showNotif('Supabase bağlantısı yok!');return;}
  sb.from('menu').insert([{kategori:kat,isim:isim,fiyat:parseInt(fiyat),aciklama:aciklama,aktif:true,stok:true,sira:99}])
    .then(function(res){
      if(res.error){showNotif('Hata: '+res.error.message);return;}
      showNotif('✓ '+isim+' eklendi!');
      menuYukle();
    });
}

// ŞEFİN MENÜSÜ
var sefOneri=[];
function sefYukle(){
  var saved=localStorage.getItem('sef_oneri');
  sefOneri=saved?JSON.parse(saved):[
    {ikon:'🥗',baslik:'Bugünün Önerisi',acik:'Şefimizin günlük seçkisi',fiyat:''},
    {ikon:'🍖',baslik:'Ana Yemek Seçkisi',acik:'Özel pişirme tekniğiyle',fiyat:''}
  ];
  document.getElementById('sef-tab').value=localStorage.getItem('sef_tab_tr')||'Şefin Menüsü';
  document.getElementById('sef-baslik').value=localStorage.getItem('sef_baslik_tr')||'Şefin Seçkileri';
  sefRender();
}

function sefRender(){
  var h='';
  sefOneri.forEach(function(o,i){
    h+='<div class="sef-item">';
    h+='<div class="field-row">';
    h+='<div class="field"><label>İKON</label><input type="text" id="si-'+i+'" value="'+o.ikon+'" style="font-size:20px;text-align:center;"></div>';
    h+='<div class="field"><label>FİYAT</label><input type="text" id="sf-'+i+'" value="'+o.fiyat+'" placeholder="₺250 veya boş"></div>';
    h+='</div>';
    h+='<div class="field"><label>BAŞLIK</label><input type="text" id="sb-'+i+'" value="'+o.baslik+'"></div>';
    h+='<div class="field"><label>AÇIKLAMA</label><textarea id="sa-'+i+'">'+o.acik+'</textarea></div>';
    h+='<button class="del-btn" onclick="sefSil('+i+')">Sil</button>';
    h+='</div>';
  });
  document.getElementById('sef-liste').innerHTML=h;
}

function sefEkle(){sefOneri.push({ikon:'⭐',baslik:'Yeni Öneri',acik:'Açıklama',fiyat:''});sefRender();}
function sefSil(i){sefOneri.splice(i,1);sefRender();showNotif('Silindi.');}

function sefKaydet(){
  var yeni=[];
  for(var i=0;i<sefOneri.length;i++){
    yeni.push({
      ikon:document.getElementById('si-'+i)?document.getElementById('si-'+i).value:'⭐',
      baslik:document.getElementById('sb-'+i)?document.getElementById('sb-'+i).value:'',
      acik:document.getElementById('sa-'+i)?document.getElementById('sa-'+i).value:'',
      fiyat:document.getElementById('sf-'+i)?document.getElementById('sf-'+i).value:''
    });
  }
  localStorage.setItem('sef_oneri',JSON.stringify(yeni));
  showNotif('✓ Şefin önerileri kaydedildi!');
}

function sefBaslikKaydet(){
  localStorage.setItem('sef_tab_tr',document.getElementById('sef-tab').value);
  localStorage.setItem('sef_baslik_tr',document.getElementById('sef-baslik').value);
  showNotif('✓ Kaydedildi!');
}

// GARSON KARTLARI
var garsonKartlar=[];
function garsonYukle(){
  var saved=localStorage.getItem('garson_kartlar');
  garsonKartlar=saved?JSON.parse(saved):[
    {ikon:'💳',ad:'HESAP',alt:'Ödeme yapmak istiyorum'},
    {ikon:'💧',ad:'SU',alt:'Su getirir misiniz?'},
    {ikon:'🧻',ad:'PEÇETE',alt:'Peçete bitti'},
    {ikon:'🫓',ad:'EKMEK',alt:'Lavaş lazım'},
    {ikon:'🙋',ad:'YARDIM',alt:'Genel talebim var'},
    {ikon:'⭐',ad:'GERİ BİLDİRİM',alt:'Deneyimimi paylaşayım'}
  ];
  garsonRender();
}

function garsonRender(){
  var h='';
  garsonKartlar.forEach(function(k,i){
    h+='<div class="garson-item">';
    h+='<div class="field-row">';
    h+='<div class="field"><label>İKON</label><input type="text" id="gi-'+i+'" value="'+k.ikon+'" style="font-size:20px;text-align:center;"></div>';
    h+='<div class="field"><label>BAŞLIK</label><input type="text" id="ga-'+i+'" value="'+k.ad+'"></div>';
    h+='</div>';
    h+='<div class="field"><label>ALT METİN</label><input type="text" id="galt-'+i+'" value="'+k.alt+'"></div>';
    h+='<button class="del-btn" onclick="garsonSil('+i+')">Sil</button>';
    h+='</div>';
  });
  document.getElementById('garson-liste').innerHTML=h;
}

function garsonEkle(){garsonKartlar.push({ikon:'🔔',ad:'YENİ',alt:'Açıklama'});garsonRender();}
function garsonSil(i){garsonKartlar.splice(i,1);garsonRender();showNotif('Silindi.');}

function garsonKaydet(){
  var yeni=[];
  for(var i=0;i<garsonKartlar.length;i++){
    yeni.push({
      ikon:document.getElementById('gi-'+i)?document.getElementById('gi-'+i).value:'🔔',
      ad:document.getElementById('ga-'+i)?document.getElementById('ga-'+i).value:'',
      alt:document.getElementById('galt-'+i)?document.getElementById('galt-'+i).value:''
    });
  }
  localStorage.setItem('garson_kartlar',JSON.stringify(yeni));
  showNotif('✓ Garson kartları kaydedildi!');
}

// ŞİFRE
function sifreKaydet(){
  var yon=document.getElementById('pw-yon').value;
  var mutfak=document.getElementById('pw-mutfak').value;
  var garson=document.getElementById('pw-garson').value;
  if(yon)localStorage.setItem('pw_yon',yon);
  if(mutfak||garson){
    var s={mutfak:mutfak||'1234',garson:garson||'5678'};
    localStorage.setItem('sifreler',JSON.stringify(s));
  }
  showNotif('✓ Şifreler kaydedildi!');
}
</script>
</body>
</html>
